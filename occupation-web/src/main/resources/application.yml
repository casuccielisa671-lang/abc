server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: occupation-platform
  profiles:
    # local 用于放本机私密配置（AI 密钥等）。application-local.yml 已 gitignore，
    # 文件不存在时 Spring 会静默跳过，队友不配也能正常启动
    active: ${SPRING_PROFILES_ACTIVE:dev,local}
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # ========== MySQL 数据源 ==========
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 用 127.0.0.1 而非 localhost：Windows 上 localhost 可能解析为 IPv6 ::1，
    # 会连到 WSL/本机残留的 MySQL 而不是 Docker 映射的 3306
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/occupation?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  # ========== Redis ==========
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms

  # ========== Kafka ==========
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: occupation-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

# ========== MyBatis-Plus ==========
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # 禁用 DDL 自动创建（已有 init.sql 管理表结构）
    enable-ddl: false

# ========== 业务能力开关 ==========
app:
  kafka:
    # 开发环境不自动创建 Kafka Topic（避免未启动 Kafka 时启动失败）
    auto-create-topics: false
  scheduler:
    # 内置定时任务总开关（分析汇总 / 每日推荐推送 / 定时报告）
    enabled: true
  user:
    # Excel 批量导入时，未在表格里填写密码的账号使用的初始密码
    default-password: ${USER_DEFAULT_PASSWORD:Occupation@123}
  report:
    # 生成的报告文件落盘目录
    storage-path: ${REPORT_STORAGE_PATH:./data/reports}
    pdf:
      # 导出 PDF 用的中文字体。留空时按「类路径 fonts/ → 系统字体目录」自动探测，
      # 都找不到会打告警且中文显示为方块（字体文件受授权限制，不随仓库分发）
      font-path: ${REPORT_PDF_FONT_PATH:}
  ai:
    # LLM 能力总开关（报告摘要 / 简历诊断 / 职业顾问 / 匹配理由）。
    # 关闭或密钥为空时，全部自动降级为规则化输出，功能不中断。
    # 打开方式见 application-local.yml.example
    enabled: ${AI_ENABLED:false}
    # OpenAI 兼容接口（DeepSeek / 通义千问 / 智谱均可）
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    # ⚠️ 密钥严禁写在本文件里（它会进 git）。用环境变量或 application-local.yml
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
    # 报告/诊断类要稳定复现，走低温；职业顾问对话在代码里另行调高
    temperature: 0.3
    max-tokens: 1200
    connect-timeout-ms: 5000
    # 大模型首字延迟常达数秒，长回复可到数十秒。设短了会把正常请求误判成失败
    read-timeout-ms: 60000
    # 只对超时和 5xx 重试；4xx 是入参问题，重试没有意义
    max-retries: 1
  open-api:
    # 开放 API Token 有效期（秒）
    token-ttl: 7200
    # 每个 apiKey 每分钟请求上限（超出返回 429）
    rate-limit-per-minute: 60

# ========== JWT 配置 ==========
jwt:
  secret: ${JWT_SECRET:occupation-platform-secret-key-2026}
  expiration: 86400000  # 24 小时

# ========== 日志 ==========
logging:
  level:
    com.occupation: INFO
    com.baomidou.mybatisplus: DEBUG



