server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: occupation-platform
  profiles:
    active: dev
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  # ========== MySQL 数据源 ==========
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 用 127.0.0.1 而非 localhost：Windows 上 localhost 可能解析为 IPv6 ::1，
    # 会连到 WSL/本机残留的 MySQL 而不是 Docker 映射的 3306
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/occupation?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  # ========== Redis ==========
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms

  # ========== Kafka ==========
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: occupation-consumer-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

# ========== MyBatis-Plus ==========
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    # 禁用 DDL 自动创建（已有 init.sql 管理表结构）
    enable-ddl: false

# ========== 业务能力开关 ==========
app:
  kafka:
    # 开发环境不自动创建 Kafka Topic（避免未启动 Kafka 时启动失败）
    auto-create-topics: false
  scheduler:
    # 内置定时任务总开关（分析汇总 / 每日推荐推送 / 定时报告）
    enabled: true
  user:
    # Excel 批量导入时，未在表格里填写密码的账号使用的初始密码
    default-password: ${USER_DEFAULT_PASSWORD:Occupation@123}
  report:
    # 生成的报告文件落盘目录
    storage-path: ${REPORT_STORAGE_PATH:./data/reports}
    pdf:
      # 导出 PDF 用的中文字体。留空时按「类路径 fonts/ → 系统字体目录」自动探测，
      # 都找不到会打告警且中文显示为方块（字体文件受授权限制，不随仓库分发）
      font-path: ${REPORT_PDF_FONT_PATH:}
  ai:
    # LLM 智能报告摘要（差异化亮点）。关闭时报告引擎自动降级为模板化文字
    enabled: false
    # OpenAI 兼容接口（DeepSeek / 通义千问 / 智谱均可），密钥用环境变量注入，严禁硬编码
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:deepseek-chat}
  open-api:
    # 开放 API Token 有效期（秒）
    token-ttl: 7200
    # 每个 apiKey 每分钟请求上限（超出返回 429）
    rate-limit-per-minute: 60

# ========== JWT 配置 ==========
jwt:
  secret: ${JWT_SECRET:occupation-platform-secret-key-2026}
  expiration: 86400000  # 24 小时

# ========== 日志 ==========
logging:
  level:
    com.occupation: INFO
    com.baomidou.mybatisplus: DEBUG

# ========== XXL-Job 调度器（可选，默认关闭；开启需先部署 xxl-job-admin） ==========
xxl:
  job:
    enabled: false
    admin:
      # XXL-Job Admin 管理端地址（需单独部署）
      addresses: ${XXL_JOB_ADMIN:http://localhost:8081/xxl-job-admin}
    accessToken: ${XXL_JOB_TOKEN:}
    executor:
      appname: occupation-crawler-executor
      port: ${XXL_JOB_EXECUTOR_PORT:9999}
      logpath: ./logs/xxl-job
      logretentiondays: 7
